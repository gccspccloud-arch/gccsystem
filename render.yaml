# Render Blueprint — deploys both the API (Node web service) and the client
# (static site) from this single repo.
#
# After connecting the repo in Render, set the following secrets in the
# dashboard for the `gcc-api` service:
#   MONGODB_URI   — your Atlas connection string
#   JWT_SECRET    — a long random string
#
# CLIENT_URL is wired automatically below from the static site's URL.

services:
  # -------------------- Backend API --------------------
  - type: web
    name: gcc-api
    env: node
    region: singapore           # closest free region to PH; change if needed
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: MONGODB_URI
        sync: false             # set in dashboard
      - key: JWT_SECRET
        sync: false             # set in dashboard
      - key: CLIENT_URL
        fromService:
          type: web
          name: gcc-web
          property: host        # e.g. gcc-web.onrender.com — Render prepends https://

  # -------------------- Frontend (Vite static) --------------------
  - type: web
    name: gcc-web
    env: static
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: gcc-api
          property: host        # e.g. gcc-api.onrender.com
    # SPA fallback so React Router deep-links work
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
