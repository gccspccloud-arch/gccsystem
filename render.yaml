# Render Blueprint — deploys both the API (Node web service) and the client
# (static site) from this single repo.
#
# After connecting the repo in Render, set the following secrets in the
# dashboard for the `gcc-api` service:
#   MONGODB_URI   — your Atlas connection string
#   JWT_SECRET    — a long random string
#
# CLIENT_URL is wired automatically below from the static site's URL.

services:
  # -------------------- Backend API --------------------
  - type: web
    name: gcc-api
    env: node
    region: singapore           # closest free region to PH; change if needed
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: MONGODB_URI
        sync: false             # set in dashboard
      - key: JWT_SECRET
        sync: false             # set in dashboard
      # NOTE: must include scheme (https://) and no trailing slash.
      # `fromService.property: host` only gives the bare hostname, which
      # won't match the browser's Origin header — set this manually in the
      # dashboard after first deploy: https://gcc-web.onrender.com
      - key: CLIENT_URL
        sync: false

  # -------------------- Frontend (Vite static) --------------------
  # Static sites are always free on Render — no `plan` field allowed.
  - type: web
    name: gcc-web
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # NOTE: must be the full URL ending in /api, e.g.
      # https://gcc-api.onrender.com/api — set this in the dashboard after
      # first deploy, then trigger a manual rebuild (Vite bakes env vars
      # into the bundle at build time, not runtime).
      - key: VITE_API_BASE_URL
        sync: false
    # SPA fallback so React Router deep-links work
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
